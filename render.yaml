services:
  - type: web
    name: smart-legal-assistant
    runtime: python
    runtimeVersion: 3.11.0
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port 8000
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
